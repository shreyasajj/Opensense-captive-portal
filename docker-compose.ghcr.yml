## Pull-only compose file — no local build needed
## Usage: docker compose -f docker-compose.ghcr.yml up -d
services:
  frontend:
    image: ghcr.io/shreyasajj/opensense-captive-portal/frontend:latest
    ports:
      - "${PORTAL_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/shreyasajj/opensense-captive-portal/backend:latest
    env_file:
      - .env
    volumes:
      - db-data:/app/db
    expose:
      - "3000"
    restart: unless-stopped

volumes:
  db-data:
