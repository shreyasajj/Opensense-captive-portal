services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "${PORTAL_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    env_file:
      - .env
    volumes:
      - db-data:/app/db
    expose:
      - "3000"
    restart: unless-stopped

volumes:
  db-data:
